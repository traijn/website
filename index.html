<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@traindeer</title>
    <link rel="icon" href="resources/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Full-Screen Click Me Banner -->
    <div id="overlay" class="overlay">
        <p>Click Me to Enter</p>
    </div>

    <video id="bg-video" muted loop preload="auto">
        <source src="/resources/nett.mp4" type="video/mp4">
    </video>
    <audio id="bg-audio" loop muted preload="auto">
        <source src="/resources/Veridis_Quo.mp3" type="audio/mp3">
    </audio>

    <div class="div1" id="interactive-div">
        <div class="container">
            <p>hello, i'm train</p>
            <p>i speak: 🇩🇪, 🇨🇭, 🇫🇮 and 🇬🇧, but i want to learn more.</p>
            <p>i like to play cs2 and listen to music, else there isn't much to say about me.</p>
            <p>if you <em>do</em> want to contact me, feel free to do so on discord, my username is <b>@traindeer</b>.</p>
            <p>къде отиваш?</p>
            <div class="social-icons">
                <a href="https://discord.com/users/1193474968193863761" target="_blank">
                    <img src="resources/discord.png"/>
                </a>
                <a href="https://youtube.com/@traindeer" target="_blank">
                    <img src="resources/youtube.png"/>
                </a>
                <a href="https://x.com/RichardBro22088" target="_blank">
                    <img src="resources/twitter.png"/>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Mousemove interaction to rotate the div
        document.addEventListener("mousemove", (e) => {
            const div = document.getElementById("interactive-div");
            const { clientX: x, clientY: y } = e;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const deltaX = (x - centerX) / centerX;
            const deltaY = (y - centerY) / centerY;
            const rotateX = deltaY * 10;
            const rotateY = deltaX * -10;
            div.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Show the overlay and play media on click
        const overlay = document.getElementById("overlay");
        const video = document.getElementById("bg-video");
        const audio = document.getElementById("bg-audio");

        overlay.addEventListener("click", () => {
            // Hide the overlay
            overlay.style.display = "none";

            // Ensure the video element is visible
            video.style.display = "block"; // Show video

            // Unmute and play the video and audio
            video.muted = false;  // Unmute video
            audio.muted = false;  // Unmute audio
            video.play();         // Play the video
            audio.play();         // Play the audio
        });
    </script>
</body>
</html>
